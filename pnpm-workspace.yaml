packages:
  - "apps/*"
  - "packages/*"

# Settings moved here from package.json's "pnpm" field (pnpm 11+).
overrides:
  multer: ^2.2.0

# Approve build scripts for native/functional deps (npm ran these previously).
# argon2 = password hashing; ssh2/cpu-features = Testcontainers (Docker) native deps;
# unrs-resolver = eslint import resolver; protobufjs = OTel. @scarf analytics disabled.
allowBuilds:
  argon2: true
  cpu-features: true
  ssh2: true
  unrs-resolver: true
  protobufjs: true
  "@scarf/scarf": false
