name: nestjs-service-template

services:
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development # keep Swagger + pretty errors in the local stack
      DATABASE_URL: postgres://app:app@postgres:5432/app
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-only-secret-change-me-32-chars!!
      MESSAGING_DRIVER: kafka
      KAFKA_BROKERS: kafka:9092
      # switch to SQS instead: MESSAGING_DRIVER=sqs + the three SQS_* vars below
      # SQS_QUEUE_URL: http://localstack:4566/000000000000/user-events
      # SQS_ENDPOINT: http://localstack:4566
      # SQS_REGION: us-east-1
      OTEL_ENABLED: 'true'
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_started

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d app']
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:5
    ports:
      - '8081:8080'
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:8-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - '5540:5540'
    depends_on:
      redis:
        condition: service_healthy

  kafka:
    image: apache/kafka:4.2.0
    ports:
      - '29092:29092' # host access (containers use kafka:9092)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ['CMD-SHELL', '/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092']
      interval: 10s
      timeout: 10s
      retries: 12

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    ports:
      - '8082:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  localstack:
    image: localstack/localstack:latest
    ports:
      - '4566:4566'
    environment:
      SERVICES: sqs
    volumes:
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:4566/_localstack/health']
      interval: 5s
      timeout: 3s
      retries: 12

  jaeger:
    image: jaegertracing/jaeger:latest # Jaeger v2 — native OTLP ingest
    ports:
      - '16686:16686' # UI
      - '4318:4318' # OTLP http

volumes:
  pgdata:
